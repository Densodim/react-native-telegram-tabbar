buildscript {
  // Match the app's Kotlin/AGP versions (react-native 0.83 / Expo SDK 55)
  ext.kotlin_version = '2.1.20'
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath 'com.android.tools.build:gradle:8.12.0'
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    // Compose Compiler Gradle plugin — required when buildFeatures.compose = true in Kotlin 2.0+
    classpath "org.jetbrains.kotlin:compose-compiler-gradle-plugin:$kotlin_version"
  }
}

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'
// Kotlin 2.0+ requires the Compose Compiler Gradle plugin instead of composeOptions
apply plugin: 'org.jetbrains.kotlin.plugin.compose'

android {
  namespace 'com.margelo.telegramtabbar'
  compileSdk 35

  defaultConfig {
    minSdk 24
    targetSdk 35
    consumerProguardFiles 'proguard-rules.pro'
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }

  kotlinOptions {
    jvmTarget = '17'
  }

  buildFeatures {
    compose true
  }
  // composeOptions removed — Kotlin 2.0+ bundles the compiler in the plugin above

  sourceSets {
    main {
      java.srcDirs += ['src/main/kotlin']
    }
  }
}

repositories {
  google()
  mavenCentral()
}

dependencies {
  implementation 'com.facebook.react:react-native'
  implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8"
  implementation "androidx.core:core-ktx:1.15.0"
  implementation 'com.qmdeve.blurview:core:1.1.4'

  // Jetpack Compose (BOM aligns all Compose library versions)
  def composeBom = platform('androidx.compose:compose-bom:2025.01.00')
  implementation composeBom
  implementation 'androidx.compose.ui:ui'
  implementation 'androidx.compose.foundation:foundation'
  implementation 'androidx.compose.runtime:runtime'
  implementation 'androidx.compose.material3:material3'
  implementation 'androidx.activity:activity-compose:1.9.3'

  // Material Icons Extended (part of Compose BOM — guaranteed available, covers all needed tab icons)
  implementation 'androidx.compose.material:material-icons-extended'
}
